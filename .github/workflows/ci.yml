name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          # Level 0 split identity and checkpoint validation pin the CPython micro version.
          python-version: "3.12.3"
      - run: pip install -r requirements/train-cpu.txt
      - run: pip install -e ".[dev]"
      - name: Harness and bootstrap tests
        run: pytest -q
      - name: Verify verbatim extraction hashes
        run: python scripts/verify_inheritance.py
      - name: Verify admitted decisions
        run: python scripts/verify_all.py
      - name: Verify Officina WP-1/WP-2 quarantine
        run: python scripts/verify_officina_wp12.py
